openapi: 3.1.0
info:
  title: MiniTask API
  version: 1.0.0
  description: Lightweight Kanban board API for small teams.

servers:
  - url: http://localhost:3000/api
    description: Development
  - url: https://your-vps-domain.com/api
    description: Production

tags:
  - name: auth
    description: Authentication (iron-session)
  - name: tasks
    description: Task CRUD and status management
  - name: members
    description: Team member management

paths:
  # ─── AUTH ───────────────────────────────────────────────

  /auth/login:
    post:
      tags: [auth]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout and clear session cookie
      operationId: logout
      responses:
        '204':
          description: Logged out successfully

  /auth/me:
    get:
      tags: [auth]
      summary: Get current session user
      operationId: getMe
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── TASKS ──────────────────────────────────────────────

  /tasks:
    get:
      tags: [tasks]
      summary: List all tasks (grouped or flat)
      operationId: listTasks
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
          description: Filter by status (future — not in MVP)
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by assignee (future — not in MVP)
      responses:
        '200':
          description: List of tasks ordered by status and position
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [tasks]
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created in To Do column
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tasks/{id}:
    get:
      tags: [tasks]
      summary: Get a single task
      operationId: getTask
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [tasks]
      summary: Update task fields (title, description, assignee)
      operationId: updateTask
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [tasks]
      summary: Delete a task
      operationId: deleteTask
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Task deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{id}/move:
    patch:
      tags: [tasks]
      summary: Move task to a different status column (drag & drop)
      operationId: moveTask
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskRequest'
      responses:
        '200':
          description: Task moved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ─── MEMBERS ────────────────────────────────────────────

  /members:
    get:
      tags: [members]
      summary: List all team members
      operationId: listMembers
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [members]
      summary: Add a new team member (admin only)
      operationId: createMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemberRequest'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /members/{id}:
    delete:
      tags: [members]
      summary: Remove a team member (admin only)
      operationId: deleteMember
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Member removed (tasks unassigned, not deleted)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ─── COMPONENTS ─────────────────────────────────────────────

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    TaskStatus:
      type: string
      enum: [TODO, IN_PROGRESS, DONE]

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        order:
          type: integer
        assigneeId:
          type: string
          format: uuid
          nullable: true
        assignee:
          $ref: '#/components/schemas/Member'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, status, order, createdAt, updatedAt]

    Member:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
      required: [id, name, email]

    SessionUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, MEMBER]
      required: [id, email, name, role]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
      required: [email, password]

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        assigneeId:
          type: string
          format: uuid
          nullable: true
      required: [title]

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        assigneeId:
          type: string
          format: uuid
          nullable: true

    MoveTaskRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/TaskStatus'
        order:
          type: integer
          minimum: 0
      required: [status, order]

    CreateMemberRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
      required: [name, email]

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: UNAUTHORIZED
            message: You must be logged in

    Forbidden:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: FORBIDDEN
            message: Admin access required

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NOT_FOUND
            message: Resource not found

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: CONFLICT
            message: Email already exists

    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: VALIDATION_ERROR
            message: Title is required
